version: '3.8'

services:
  # Development mode - hot reload aktif, akses HP mudah
  qooz-web:
    image: node:20-alpine
    container_name: qooz-web
    ports:
      - "3000:3000"
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8090/qooz/api
      - NEXT_PUBLIC_POLL_INTERVAL=2000
      - NEXT_PUBLIC_GAME_TIMEOUT=30000
    command: sh -c "npm run dev -- --hostname 0.0.0.0"
    depends_on:
      - qooz-api
    networks:
      - qooz-net
    restart: unless-stopped

  qooz-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: qooz-api
    ports:
      - "8090:80"
    volumes:
      - ./mysql-schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    depends_on:
      qooz-db:
        condition: service_healthy
    networks:
      - qooz-net
    restart: unless-stopped

  qooz-db:
    image: docker.io/library/mariadb:10.11
    container_name: qooz-db
    environment:
      MYSQL_ROOT_PASSWORD: qooz_root_pass
      MYSQL_DATABASE: qooz_windows_db
      MYSQL_USER: qooz_user
      MYSQL_PASSWORD: qooz_pass_2024
    ports:
      - "3306:3306"
    volumes:
      - qooz-dbdata:/var/lib/mysql
      - ./mysql-schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    networks:
      - qooz-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 10s
      timeout: 5s
      retries: 5

  qooz-pma:
    image: docker.io/library/phpmyadmin:latest
    container_name: qooz-pma
    ports:
      - "8091:80"
    environment:
      PMA_HOST: qooz-db
      PMA_USER: root
      PMA_PASSWORD: qooz_root_pass
    depends_on:
      - qooz-db
    networks:
      - qooz-net
    restart: unless-stopped

volumes:
  qooz-dbdata:

networks:
  qooz-net:
    driver: bridge
